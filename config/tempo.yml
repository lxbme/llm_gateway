# Tempo — single-binary trace backend. Receives OTLP gRPC on :4317 (from the
# collector), stores trace blocks on the tempo-data volume, and serves a query
# API on :3200 that Grafana points at.
#
# Retention is intentionally short (24h) for local development — long-term
# storage / S3 / GCS backends are deferred to a production-grade config.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
