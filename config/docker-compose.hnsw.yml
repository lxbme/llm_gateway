# =============================================================================
# Redis Stack (RediSearch + HNSW) overlay for cache-service.
#
# Use ONLY when CACHE_STORE_PROVIDER=redis_hnsw. Does NOT replace the existing
# redis:alpine container used by auth-service (that stays as-is on port 6379).
#
# Usage:
#
#   CACHE_STORE_PROVIDER=redis_hnsw docker compose \
#     -f docker-compose.yml \
#     -f config/docker-compose.hnsw.yml \
#     up -d --build
#
# Docker Compose appends `environment` and `depends_on` from this overlay onto
# the cache-service definition in docker-compose.yml — existing QDRANT_* vars
# remain set but are ignored by the factory when CACHE_STORE_PROVIDER=redis_hnsw.
#
# Default HNSW tuning (M=16, EF_CONSTRUCTION=200, EF_RUNTIME=10) matches the
# RediSearch upstream recommendation for ≤768-dim embeddings; raise EF_RUNTIME
# to trade latency for recall.
# =============================================================================

services:
  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: llm_redis_stack
    ports:
      - "6380:6379"
    volumes:
      - ./redis_hnsw_storage:/data:Z
    restart: unless-stopped
    networks:
      - ai-net

  cache-service:
    depends_on:
      redis-stack:
        condition: service_started
    environment:
      - REDIS_HNSW_ADDR=redis-stack:6379
      - REDIS_HNSW_INDEX_NAME=${REDIS_HNSW_INDEX_NAME:-llm_semantic_cache_idx}
      - REDIS_HNSW_KEY_PREFIX=${REDIS_HNSW_KEY_PREFIX:-llm_semantic_cache}
      - REDIS_HNSW_SIMILARITY_THRESHOLD=${REDIS_HNSW_SIMILARITY_THRESHOLD:-0.95}
      - REDIS_HNSW_DISTANCE_METRIC=${REDIS_HNSW_DISTANCE_METRIC:-COSINE}
      - REDIS_HNSW_M=${REDIS_HNSW_M:-16}
      - REDIS_HNSW_EF_CONSTRUCTION=${REDIS_HNSW_EF_CONSTRUCTION:-200}
      - REDIS_HNSW_EF_RUNTIME=${REDIS_HNSW_EF_RUNTIME:-10}
      - REDIS_HNSW_RECORD_TTL_SECONDS=${REDIS_HNSW_RECORD_TTL_SECONDS:-0}
