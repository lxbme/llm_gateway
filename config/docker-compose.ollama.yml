# =============================================================================
# Ollama embedding provider overlay.
#
# Wires embedding-service to a HOST-side ollama daemon (the systemd `ollama`
# service that ships with the upstream installer). embedding-service stays on
# the ai-net bridge so observability (Prometheus scrape, OTel trace export)
# works exactly like every other service — we just give the container a route
# back to the host via Docker's host-gateway alias.
#
# Why not run ollama in a container? The official `ollama/ollama` image is
# ~2GB and brings its own CUDA stack, which is wasteful when the host already
# has ollama + models installed. For local dev the host install is the right
# answer; for production / multi-host, point EMBED_ENDPOINT at a shared
# inference server instead and skip this overlay.
#
# Usage:
#
#   EMBED_PROVIDER=ollama bash docker-run.sh -d
#   EMBED_PROVIDER=ollama bash docker-run.sh --observe -d   # with tracing
#
# -----------------------------------------------------------------------------
# Host-side prerequisites
# -----------------------------------------------------------------------------
# 1. Ollama must listen on an interface the container can reach. The systemd
#    package binds 127.0.0.1:11434 by default, which is invisible from inside
#    Docker. Add a drop-in override so it listens on the docker bridge (or all
#    interfaces, if you don't mind exposing 11434 to LAN — see firewall note):
#
#      sudo mkdir -p /etc/systemd/system/ollama.service.d
#      sudo tee /etc/systemd/system/ollama.service.d/override.conf >/dev/null <<'EOF'
#      [Service]
#      Environment="OLLAMA_HOST=0.0.0.0:11434"
#      EOF
#      sudo systemctl daemon-reload
#      sudo systemctl restart ollama
#
#    OLLAMA_HOST=0.0.0.0 exposes 11434 on every network interface. On a
#    machine with untrusted LAN access, block external traffic at the
#    firewall — for firewalld:
#
#      sudo firewall-cmd --permanent --add-rich-rule='rule family=ipv4 \
#        source NOT address=172.16.0.0/12 port port=11434 protocol=tcp reject'
#      sudo firewall-cmd --reload
#
#    (172.16.0.0/12 covers the default Docker bridge subnets.)
#
# 2. Pull the embedding model on the host (only needed once):
#
#      ollama pull qwen3-embedding:0.6b
#
# 3. Sanity check:
#
#      curl http://localhost:11434/api/tags     # should list the model
#
# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
#   - This overlay is needed only when EMBED_PROVIDER=ollama. The OpenAI
#     provider does not require it.
#   - EMBED_DIMENSIONS must match the chosen model's true output size or
#     embedding-service crashes at startup (probe check).
#   - For multi-host deployments, replace `host.docker.internal:11434` with
#     the address of your shared ollama / inference server.
#   - nvidia-container-toolkit is NOT required — GPU is used by the host
#     ollama daemon directly, not by any container.
# =============================================================================

services:
  embedding-service:
    # host-gateway makes the hostname `host.docker.internal` resolve to the
    # Docker host's IP from inside this container. Linux Docker requires the
    # explicit extra_hosts entry (it works out-of-the-box on Docker Desktop).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - EMBED_PROVIDER=ollama
      - EMBED_ENDPOINT=http://host.docker.internal:11434/api/embed
      - EMBED_MODEL=${EMBED_MODEL:-qwen3-embedding:0.6b}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS:-1024}
      - EMBED_API_KEY=${EMBED_API_KEY:-}
