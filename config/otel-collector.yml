# OpenTelemetry Collector — receives OTLP gRPC from llm_gateway services and
# forwards traces to Tempo. Metrics still go directly to Prometheus (scrape
# pull), not through the collector, so the collector here is trace-only.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
