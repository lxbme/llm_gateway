version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:Z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - ai-net

  qdrant-ready:
    image: busybox:latest
    command: sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://qdrant:6333/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s
    depends_on:
      - qdrant
    networks:
      - ai-net
  
  redis:
    image: redis:alpine
    container_name: llm_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_storage:/data:Z
    restart: unless-stopped
    networks:
      - ai-net
  
  
  embedding-service:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.embedding
    ports:
      - "50051:50051"
    environment:
      - EMBED_PROVIDER=${EMBED_PROVIDER}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_ENDPOINT=${EMBED_ENDPOINT}
      - EMBED_MODEL=${EMBED_MODEL}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS}
    networks:
      - ai-net

  cache-service:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.cache
    ports:
      - "50052:50052"
    environment:
      - CACHE_MODE=${CACHE_MODE:-semantic}
      - CACHE_STORE_PROVIDER=${CACHE_STORE_PROVIDER:-qdrant}
      - CACHE_BUFFER_SIZE=${CACHE_BUFFER_SIZE:-1000}
      - CACHE_WORKER_COUNT=${CACHE_WORKER_COUNT:-5}
      - EMBED_ADDR=embedding-service:50051
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-llm_semantic_cache}
      - QDRANT_SIMILARITY_THRESHOLD=${QDRANT_SIMILARITY_THRESHOLD:-0.95}
    depends_on:
      embedding-service:
        condition: service_started
      qdrant-ready:
        condition: service_healthy
    restart: on-failure
    networks:
      - ai-net
  
  completion-service:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.completion
    ports:
      - "50053:50053"
    environment:
      - COMPL_API_KEY=${COMPL_API_KEY}
      - COMPL_ENDPOINT=${COMPL_ENDPOINT}
    networks:
      - ai-net
  
  auth-service:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.auth
    ports:
      - "50054:50054"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_DB=${REDIS_DB:-0}
    depends_on:
      - redis
    networks:
      - ai-net
    
  rag-service:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.rag
    ports:
      - "50055:50055"
    environment:
      - EMBED_ADDR=embedding-service:50051
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION_NAME=${RAG_QDRANT_COLLECTION_NAME:-llm_rag_documents}
      - RAG_SIMILARITY_THRESHOLD=${RAG_SIMILARITY_THRESHOLD:-0.6}
      - RAG_DEFAULT_TOP_K=${RAG_DEFAULT_TOP_K:-3}
    depends_on:
      embedding-service:
        condition: service_started
      qdrant-ready:
        condition: service_healthy
    restart: on-failure
    networks:
      - ai-net

  gateway:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.gateway
    ports:
      - "8080:8080"
      - "127.0.0.1:8081:8081"
    environment:
      - CACHE_ADDR=cache-service:50052
      - COMPL_ADDR=completion-service:50053
      - AUTH_ADDR=auth-service:50054
      - RAG_ADDR=rag-service:50055
      - DEBUG_MODE=${DEBUG_MODE}
      - LOG_LEVEL=${LOG_LEVEL:-ERROR}
      - ADMIN_SECRET=${ADMIN_SECRET}
    depends_on:
      - cache-service
      - completion-service
      - auth-service
      - rag-service
    restart: on-failure
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge