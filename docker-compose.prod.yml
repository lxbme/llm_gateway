version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:Z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - ai-net

  qdrant-ready:
    image: busybox:latest
    command: sleep infinity
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://qdrant:6333/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s
    depends_on:
      - qdrant
    networks:
      - ai-net

  redis:
    image: redis:alpine
    container_name: llm_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_storage:/data:Z
    restart: unless-stopped
    networks:
      - ai-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: llm_etcd
    command:
      - /usr/local/bin/etcd
      - --name=node0
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=node0=http://etcd:2380
    ports:
      - "2379:2379"
    restart: unless-stopped
    networks:
      - ai-net

  embedding-service:
    image: ghcr.io/lxbme/llm-gateway-embedding-service:${IMAGE_TAG:-latest}
    # ports section removed to allow `docker compose up --scale embedding-service=N`
    # without host-port collisions. Other services reach embedding via etcd
    # discovery (or the ai-net DNS name `embedding-service` for the single-instance
    # fallback path). Re-add `ports: ["50051:50051"]` only if you need to call
    # embedding from the host.
    expose:
      - "50051"
    environment:
      - EMBED_PROVIDER=${EMBED_PROVIDER}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_ENDPOINT=${EMBED_ENDPOINT}
      - EMBED_MODEL=${EMBED_MODEL}
      - EMBED_DIMENSIONS=${EMBED_DIMENSIONS}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
      # ADVERTISE_ADDR falls back to ${HOSTNAME}:50051 when unset, which is
      # exactly what the container's hostname gives us under compose scaling.
      - ADVERTISE_ADDR=${EMBEDDING_ADVERTISE_ADDR:-}
    depends_on:
      - etcd
    networks:
      - ai-net

  cache-service:
    image: ghcr.io/lxbme/llm-gateway-cache-service:${IMAGE_TAG:-latest}
    expose:
      - "50052"
    environment:
      - ADVERTISE_ADDR=${CACHE_ADVERTISE_ADDR:-}
      - CACHE_MODE=${CACHE_MODE:-semantic}
      - CACHE_STORE_PROVIDER=${CACHE_STORE_PROVIDER:-qdrant}
      - CACHE_BUFFER_SIZE=${CACHE_BUFFER_SIZE:-1000}
      - CACHE_WORKER_COUNT=${CACHE_WORKER_COUNT:-5}
      - EMBED_ADDR=embedding-service:50051
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-llm_semantic_cache}
      - QDRANT_SIMILARITY_THRESHOLD=${QDRANT_SIMILARITY_THRESHOLD:-0.95}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
    depends_on:
      embedding-service:
        condition: service_started
      qdrant-ready:
        condition: service_healthy
      etcd:
        condition: service_started
    restart: on-failure
    networks:
      - ai-net

  completion-service:
    image: ghcr.io/lxbme/llm-gateway-completion-service:${IMAGE_TAG:-latest}
    expose:
      - "50053"
    environment:
      - COMPL_API_KEY=${COMPL_API_KEY}
      - COMPL_ENDPOINT=${COMPL_ENDPOINT}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
      - ADVERTISE_ADDR=${COMPLETION_ADVERTISE_ADDR:-}
    depends_on:
      - etcd
    networks:
      - ai-net

  auth-service:
    image: ghcr.io/lxbme/llm-gateway-auth-service:${IMAGE_TAG:-latest}
    expose:
      - "50054"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_DB=${REDIS_DB:-0}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
      - ADVERTISE_ADDR=${AUTH_ADVERTISE_ADDR:-}
    depends_on:
      - redis
      - etcd
    networks:
      - ai-net

  rag-service:
    image: ghcr.io/lxbme/llm-gateway-rag-service:${IMAGE_TAG:-latest}
    expose:
      - "50055"
    environment:
      - ADVERTISE_ADDR=${RAG_ADVERTISE_ADDR:-}
      - EMBED_ADDR=embedding-service:50051
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION_NAME=${RAG_QDRANT_COLLECTION_NAME:-llm_rag_documents}
      - RAG_SIMILARITY_THRESHOLD=${RAG_SIMILARITY_THRESHOLD:-0.6}
      - RAG_DEFAULT_TOP_K=${RAG_DEFAULT_TOP_K:-3}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
    depends_on:
      embedding-service:
        condition: service_started
      qdrant-ready:
        condition: service_healthy
      etcd:
        condition: service_started
    restart: on-failure
    networks:
      - ai-net

  gateway:
    image: ghcr.io/lxbme/llm-gateway-gateway:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
      - "127.0.0.1:8081:8081"
    environment:
      - CACHE_ADDR=cache-service:50052
      - COMPL_ADDR=completion-service:50053
      - AUTH_ADDR=auth-service:50054
      - RAG_ADDR=rag-service:50055
      - DEBUG_MODE=${DEBUG_MODE}
      - LOG_LEVEL=${LOG_LEVEL:-ERROR}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - ETCD_ENDPOINTS=${ETCD_ENDPOINTS:-etcd:2379}
    depends_on:
      - cache-service
      - completion-service
      - auth-service
      - rag-service
      - etcd
    restart: on-failure
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge
